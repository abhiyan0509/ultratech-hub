<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraTech Executive Intelligence | V7</title>
    <meta name="description" content="Premium executive intelligence platform for UltraTech Cement">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: {
                            DEFAULT: '#09090b',
                            card: '#111114',
                            border: '#1f1f23',
                            hover: '#27272a'
                        },
                        gold: {
                            DEFAULT: '#d4af37',
                            muted: '#b8922e'
                        }
                    },
                    fontFamily: {
                        heading: ['Manrope', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <!-- React & Dependencies via ESM -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
            "htm": "https://esm.sh/htm",
            "clsx": "https://esm.sh/clsx@2.1.0",
            "tailwind-merge": "https://esm.sh/tailwind-merge@2.2.1"
        }
    }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            html {
                scroll-behavior: smooth;
            }

            body {
                @apply bg-slate-50 text-slate-800 font-body antialiased transition-colors duration-500;
                min-height: 101vh;
                /* Forces scrollbar to be always present to prevent layout shifts */
            }

            .dark body {
                @apply bg-obsidian text-slate-200;
            }

            h1,
            h2,
            h3,
            h4 {
                @apply font-heading tracking-tight;
            }
        }

        /* Platform Theme Engine */
        .glass-panel {
            @apply backdrop-blur-xl border transition-all duration-500 bg-white/70 border-slate-200 shadow-sm text-slate-900;
        }

        .dark .glass-panel {
            @apply bg-obsidian-card/60 border-obsidian-border text-slate-200 shadow-none;
        }

        .bg-obsidian-card {
            @apply bg-white/80 border border-slate-100 shadow-sm transition-all duration-500;
        }

        .dark .bg-obsidian-card {
            @apply bg-obsidian-card border-obsidian-border shadow-none;
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }

            100% {
                background-position: 1000px 0;
            }
        }

        @keyframes ticker-move {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-ticker {
            animation: ticker-move 40s linear infinite;
        }

        .clip-half-gauge {
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
        }

        #root:empty::before {
            content: 'Initializing Executive Platform...';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #d4af37;
            opacity: 0.5;
            font-size: 10px;
        }
    </style>
</head>

<body class="overflow-x-hidden">
    <div id="root"></div>

    <script>
        window.API_BASE = '';
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            console.error('Platform Critical Error:', msg, url, lineNo, columnNo, error);
            const root = document.getElementById('root');
            if (root && root.innerHTML === '') {
                root.innerHTML = '<div style="color: #ff4444; padding: 20px; font-family: sans-serif; text-align: center;">' +
                    '<h3>Platform Boot Error</h3>' +
                    '<p style="font-size: 12px; color: #888;">' + msg + '</p>' +
                    '<p style="font-size: 10px; color: #555;">Check browser console for details</p></div>';
            }
            return false;
        };
    </script>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Main Module -->
    <script type="module" src="app.js"></script>
</body>

</html>
