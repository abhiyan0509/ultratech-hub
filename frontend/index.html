<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraTech Executive Intelligence | V7</title>
    <meta name="description" content="Premium executive intelligence platform for UltraTech Cement">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: {
                            DEFAULT: '#09090b',
                            card: '#111114',
                            border: '#1f1f23',
                            hover: '#27272a'
                        },
                        gold: {
                            DEFAULT: '#d4af37',
                            muted: '#b8922e'
                        }
                    },
                    fontFamily: {
                        heading: ['Manrope', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <!-- React & Dependencies via ESM -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8",
            "chart.js": "https://esm.sh/chart.js@4.4.0",
            "clsx": "https://esm.sh/clsx@2.1.0",
            "tailwind-merge": "https://esm.sh/tailwind-merge@2.2.1"
        }
    }
    </script>

    <style>
        @layer base {
            body {
                @apply bg-obsidian text-slate-200 font-body antialiased;
            }

            h1,
            h2,
            h3,
            h4 {
                @apply font-heading tracking-tight;
            }
        }

        /* Custom scrollbar to match Obsidian theme */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }

        .glass-panel {
            @apply bg-obsidian-card/60 backdrop-blur-xl border border-obsidian-border;
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }

            100% {
                background-position: 1000px 0;
            }
        }

        @keyframes ticker-move {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-ticker {
            animation: ticker-move 40s linear infinite;
        }

        .animate-ticker:hover {
            animation-play-state: paused;
        }

        .clip-half-gauge {
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
        }
    </style>
</head>

<body class="dark overflow-x-hidden">
    <div id="root"></div>

    <!-- Legacy script fallbacks or helper constants -->
    <script>
        window.API_BASE = '';
    </script>

    <!-- React App Launch -->
    <script type="module" src="App.jsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>

</html>

</html>
