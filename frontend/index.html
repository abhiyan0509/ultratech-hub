<!DOCTYPE html>
<!-- Platform Version: 7.0.5-STABLE -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraTech Executive Intelligence | V7</title>
    <meta name="description" content="Premium executive intelligence platform for UltraTech Cement">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: {
                            DEFAULT: '#09090b',
                            card: '#111114',
                            border: '#1f1f23',
                            hover: '#27272a'
                        },
                        gold: {
                            DEFAULT: '#d4af37',
                            muted: '#b8922e'
                        }
                    },
                    fontFamily: {
                        heading: ['Manrope', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <!-- React & Dependencies via ESM -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
            "htm": "https://esm.sh/htm",
            "clsx": "https://esm.sh/clsx@2.1.0",
            "tailwind-merge": "https://esm.sh/tailwind-merge@2.2.1"
        }
    }
    </script>

    <style>
        /* Base Reset & Core Styles */
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #f8fafc;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.5s, color 0.5s;
            min-height: 101vh;
            margin: 0;
        }

        .dark body {
            background-color: #09090b;
            color: #e2e8f0;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Manrope', sans-serif;
            letter-spacing: -0.025em;
        }

        /* Platform Theme Engine (CSS Components) */
        .glass-panel {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            background-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.5s;
            color: #0f172a;
        }

        .dark .glass-panel {
            background-color: rgba(17, 17, 20, 0.6);
            border-color: #1f1f23;
            color: #e2e8f0;
            box-shadow: none;
        }

        .bg-obsidian-card {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(241, 245, 249, 1);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.5s;
        }

        .dark .bg-obsidian-card {
            background-color: #111114;
            border-color: #1f1f23;
            box-shadow: none;
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }

            100% {
                background-position: 1000px 0;
            }
        }

        @keyframes ticker-move {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-ticker {
            animation: ticker-move 40s linear infinite;
        }

        .clip-half-gauge {
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
        }

        #root:empty::before {
            content: 'Initializing Executive Platform...';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #d4af37;
            opacity: 0.5;
            font-size: 10px;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d4af3733;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #d4af3755;
        }
    </style>
</head>

<body class="overflow-x-hidden">
    <div id="root"></div>

    <script>
        window.API_BASE = '';
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            console.error('Platform Critical Error:', msg, url, lineNo, columnNo, error);
            const root = document.getElementById('root');
            if (root && root.innerHTML === '') {
                root.innerHTML = '<div style="color: #ff4444; padding: 20px; font-family: sans-serif; text-align: center;">' +
                    '<h3>Platform Boot Error</h3>' +
                    '<p style="font-size: 12px; color: #888;">' + msg + '</p>' +
                    '<p style="font-size: 10px; color: #555;">Check browser console for details</p></div>';
            }
            return false;
        };
    </script>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Main Module -->
    <script type="module" src="app.js"></script>
</body>

</html>
