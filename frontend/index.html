<!DOCTYPE html>
<!-- Platform Version: 7.0.5-STABLE -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraTech Executive Intelligence | V7</title>
    <meta name="description" content="Premium executive intelligence platform for UltraTech Cement">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: {
                            DEFAULT: '#09090b',
                            card: '#111114',
                            border: '#1f1f23',
                            hover: '#27272a'
                        },
                        gold: {
                            DEFAULT: '#d4af37',
                            muted: '#b8922e'
                        }
                    },
                    fontFamily: {
                        heading: ['Manrope', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    },
                    boxShadow: {
                        'premium': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
                        'gold-glow': '0 0 20px rgba(212, 175, 55, 0.15)'
                    }
                }
            }
        }
    </script>

    <!-- React & Dependencies via ESM -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
            "htm": "https://esm.sh/htm",
            "clsx": "https://esm.sh/clsx@2.1.0",
            "tailwind-merge": "https://esm.sh/tailwind-merge@2.2.1"
        }
    }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            html {
                scroll-behavior: smooth;
            }

            body {
                @apply bg-slate-50 text-slate-800 font-body antialiased transition-colors duration-500;
            }

            .dark body {
                @apply bg-obsidian text-slate-200;
            }

            h1, h2, h3, h4, h5, h6 {
                @apply font-heading tracking-tight font-bold;
            }
        }

        @layer components {
            .glass-panel {
                @apply bg-white/70 dark:bg-obsidian-card/60 backdrop-blur-2xl border border-slate-200/50 dark:border-obsidian-border/50 shadow-sm transition-all duration-500;
            }

            .glass-panel:hover {
                @apply border-gold/30 shadow-premium;
            }

            .bg-obsidian-card {
                @apply bg-white dark:bg-obsidian-card border border-slate-200 dark:border-obsidian-border;
            }
        }

        /* Essential Animations */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .animate-shimmer {
            background: linear-gradient(90deg, rgba(212,175,55,0) 0%, rgba(212,175,55,0.05) 50%, rgba(212,175,55,0) 100%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite linear;
        }

        @keyframes pulse-gold {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .gold-glow {
            @apply shadow-gold-glow border-gold/20;
        }

        #root:empty::before {
            content: 'Initializing Premium Platform...';
            @apply fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 font-heading font-black text-xs uppercase tracking-[0.3em] text-gold/40 animate-pulse;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            @apply w-1.5;
        }

        ::-webkit-scrollbar-track {
            @apply bg-transparent;
        }

        ::-webkit-scrollbar-thumb {
            @apply bg-gold/10 rounded-full border-4 border-transparent bg-clip-content hover:bg-gold/30 transition-colors;
        }
    </style>
</head>

<body class="overflow-x-hidden">
    <div id="root"></div>

    <script>
        window.API_BASE = '';
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            console.error('Platform Critical Error:', msg, url, lineNo, columnNo, error);
            const root = document.getElementById('root');
            if (root && root.innerHTML === '') {
                root.innerHTML = '<div style="color: #ff4444; padding: 20px; font-family: sans-serif; text-align: center;">' +
                    '<h3>Platform Boot Error</h3>' +
                    '<p style="font-size: 12px; color: #888;">' + msg + '</p>' +
                    '<p style="font-size: 10px; color: #555;">Check browser console for details</p></div>';
            }
            return false;
        };
    </script>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Main Module -->
    <script type="module" src="app.js"></script>
</body>

</html>
